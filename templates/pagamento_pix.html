<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX - SalesHub</title>
    <style>
        :root { --primary: #22c55e; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); }
        .total-box { font-size: 2rem; font-weight: 900; color: var(--primary); margin: 20px 0; }
        .pix-key { background: var(--bg); padding: 15px; border-radius: 12px; border: 1px dashed var(--primary); color: #fff; word-break: break-all; font-family: monospace; margin: 15px 0; }
        .status-badge { background: #f59e0b; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-home { display: block; width: 100%; padding: 15px; background: var(--border); color: white; text-decoration: none; border-radius: 12px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <span class="status-badge">AGUARDANDO PAGAMENTO</span>
            <h2>Total do Pedido</h2>
            <div class="total-box">R$ {{ "%.2f"|format(pedido.valor_total) }}</div>
            
            <p style="color: #94a3b8;">Pague via PIX para a barraca:</p>
            <h4 style="margin-bottom: 5px;">{{ barraca.nome_barraca }}</h4>
            <div class="pix-key" id="pixKey">{{ barraca.pix }}</div>
            
            <p style="font-size: 13px; color: #94a3b8; margin-top: 20px;">
                Após pagar, avise o vendedor na barraca. Ele confirmará seu pedido no painel dele.
            </p>

            <a href="/" class="btn-home">Voltar ao Início</a>
        </div>
    </div>
</body>
</html>
