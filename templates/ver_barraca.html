<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ barraca.nome_barraca }} - Cardápio</title>
    <style>
        :root { 
            --primary: #22c55e; 
            --primary-dark: #16a34a;
            --bg: #020617; 
            --card: #1e293b; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            padding-bottom: 100px; /* Espaço para o botão fixo */
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cabeçalho da Unidade */
        .stall-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .stall-header h1 { margin: 0; font-size: 22px; font-weight: 800; color: white; }
        .stall-tag {
            display: inline-block;
            background: rgba(34, 197, 94, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .section-label {
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 20px 0 15px 5px; display: block;
        }

        /* Card de Produto */
        .product-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .product-name { font-size: 17px; font-weight: 700; color: white; margin: 0; }
        .product-price { font-size: 16px; font-weight: 800; color: var(--primary); }
        .product-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px; }

        /* Seletor de Quantidade Profissional */
        .qty-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.5);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .qty-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

        .qty-input {
            background: var(--bg);
            border: 1px solid var(--primary);
            color: white;
            width: 60px;
            text-align: center;
            padding: 6px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
        }

        /* Botão Flutuante de Checkout */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .btn-checkout {
            width: 100%;
            max-width: 410px;
            height: 60px;
            background: var(--primary);
            color: #052e16;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-checkout:hover { transform: translateY(-3px); background: var(--primary-dark); }
        .btn-checkout:active { transform: scale(0.96); }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 13px;
            display: inline-block;
            margin-bottom: 15px;
        }
